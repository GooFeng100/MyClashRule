# 节点信息
# proxies:
#   - {name: 直连, type: direct}

# 全局配置 
port: 7890  # HTTP(S) 代理服务器端口
socks-port: 7891  # SOCKS5 代理端口
redir-port: 7892  # 透明代理端口，用于 Linux 和 MacOS
mixed-port: 7893  # HTTP(S) 和 SOCKS 代理混合端口
tproxy-port: 7894  # Transparent proxy server port for Linux (TProxy TCP and TProxy UDP)
allow-lan: true  # 允许局域网连接
bind-address: "*"  # 绑定 IP 地址，仅作用于 allow-lan 为 true，'*'表示所有地址
ipv6: false  # 开启 IPv6 总开关，关闭阻断所有 IPv6 链接和屏蔽 DNS 请求 AAAA 记录
# unified-delay: true
tcp-concurrent: true  # TCP 并发连接所有 IP, 将使用最快握手的 TCP
log-level: warning  #日志级别
#  find-process-mode has 3 values:always, strict, off
find-process-mode: 'off'
#  - always, 开启，强制匹配所有进程
#  - strict, 默认，由 mihomo 判断是否开启
#  - off, 不匹配进程，推荐在路由器上使用此模式
# interface-name: en0
global-client-fingerprint: chrome # 浏览器指纹
keep-alive-idle: 600
keep-alive-interval: 15
disable-keep-alive: false
profile: # 存储 select 选择记录
  store-selected: false
  store-fake-ip: true # 持久化 fake-ip

# 嗅探
sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  force-domain:
    - "+.v2ex.com"
  skip-domain:
    - "+.baidu.com"

# 入站  
tun:
  enable: true
  # system/gvisor/mixed
  stack: mixed
  dns-hijack:
    - 0.0.0.0:53 # 需要劫持的 DNS
  auto-route: true  # 配置路由表
  auto-redirect: false  # 自动配置 iptables 以重定向 TCP 连接。仅支持 Linux。带有 auto-redirect 的 auto-route 现在可以在路由器上按预期工作，无需干预。
  auto-detect-interface: true  # 自动识别出口网卡

# DNS模块
dns:
  enable: false
  listen: 0.0.0.0:53
  ipv6: false
  respect-rules: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16 # fake-ip 池设置
  fake-ip-filter-mode: blacklist
  fake-ip-filter:
    - "rule-set:private_domain,cn_domain"
    - "+.msftconnecttest.com"
    - "+.msftncsi.com"
    - "time.*.com"
    - "+.market.xiaomi.com"
  default-nameserver:
    - 127.0.0.1:53
  proxy-server-nameserver:
    - https://223.5.5.5/dns-query
  # namesever尽量用运营商提供的DNS
  nameserver:
    - 127.0.0.1:533
 
# 出站策略
# 注意锚点必须放在引用的上方，可以集中把锚点全部放yaml的顶部。
pr: &pr {type: select, proxies: [🚀 出站代理,DIRECT, ♻️ 自动选择, ♻️ 香港自动, ♻️ 日本自动, ♻️ 新加坡自动, ♻️ 美国自动, 🇭🇰 香港节点, 🇯🇵 日本节点, 🇸🇬 新加坡, 🇺🇸 美国节点, 🇺🇳 其他地区]}
proxy-groups:
  - {name: 🚀 出站代理, type: select, proxies: [DIRECT, ♻️ 自动选择, 🌏 亚太负载均衡, 🗽 北美负载均衡, ♻️ 香港自动, ♻️ 日本自动, ♻️ 新加坡自动, ♻️ 美国自动, 🇭🇰 香港节点, 🇯🇵 日本节点, 🇸🇬 新加坡, 🇺🇸 美国节点, 🇺🇳 其他地区]}
  - {name: 💵 美国券商, type: select, proxies: [ 🚀 出站代理], include-all-providers: true, filter: "(?i)^(?=.*(日本|川日|东京|大阪|泉日|埼玉|沪日|深日|JP|Japan|美|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|US|United States))((?!(澳大利亚|AU|Australia)).)*$"}
 # - {name: 💶 ATAS, type: select, proxies: [ 🚀 出站代理], include-all-providers: true, filter: "(?i)DE|德国|Germany"}
  - {name: 📹 YouTube, <<: *pr}
  - {name: 🍀 Google, <<: *pr}
  - {name: 🤖 ChatGPT, <<: *pr}
  - {name: 👨🏿‍💻 GitHub, <<: *pr}
  - {name: 🐬 OneDrive, <<: *pr}
  - {name: 🪟 Microsoft, <<: *pr}
  - {name: 🎵 TikTok, <<: *pr}
  - {name: 📲 Telegram, <<: *pr}
  - {name: 🎥 NETFLIX, <<: *pr}
  - {name: ✈️ Speedtest, <<: *pr}
  - {name: 💶 PayPal, <<: *pr}
  - {name: 🍎 Apple, type: select, proxies: [DIRECT, 🚀 出站代理]}
  - {name: 🎯 直连, type: select, proxies: [DIRECT, 🚀 出站代理]}
  - {name: 🐟 漏网之鱼, <<: *pr}
  - {name: 🌏 亚太负载均衡, type: load-balance,strategy: consistent-hashing,include-all-providers: true, filter: "(?i)港|HK|hk|Hong Kong|HongKong|日本|川日|东京|大阪|泉日|埼玉|沪日|深日|JP|Japan|新加坡|坡|狮城|SG|Singapore",url: 'https://www.gstatic.com/generate_204',interval: 300}
  - {name: 🗽 北美负载均衡, type: load-balance,strategy: consistent-hashing,include-all-providers: true, filter: "(?i)^(?=.*(美|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|US|United States))((?!(澳大利亚|AU|Australia)).)*$",url: 'https://www.gstatic.com/generate_204',interval: 300}  
  - {name: 🇭🇰 香港节点, type: select, include-all-providers: true, filter: "(?i)港|HK|hk|Hong Kong|HongKong"}
  - {name: 🇯🇵 日本节点, type: select, include-all-providers: true, filter: "(?i)日本|川日|东京|大阪|泉日|埼玉|沪日|深日|JP|Japan"}
  - {name: 🇸🇬 新加坡, type: select, include-all-providers: true, filter: "(?i)新加坡|坡|狮城|SG|Singapore"}
  - {name: 🇺🇸 美国节点, type: select, include-all-providers: true, filter: "(?i)^(?=.*(美|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|US|United States))((?!(澳大利亚|AU|Australia)).)*$"}
  - {name: 🇺🇳 其他地区, type: select, include-all-providers: true, filter: "^(?!.*(港|HK|hk|Hong Kong|HongKong|hongkong|日本|川日|东京|大阪|泉日|埼玉|沪日|深日|JP|Japan|新加坡|坡|狮城|SG|Singapore|美|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|US|United States)).*$"}
  - {name: ♻️ 香港自动, type: url-test, include-all-providers: true, tolerance: 20, interval: 300, filter: "(?i)^(?=.*(港|HK|Hong))((?!(台|日|韩|新|深|美)).)*$"}
  - {name: ♻️ 日本自动, type: url-test, include-all-providers: true, tolerance: 20, interval: 300, filter: "(?i)^(?=.*(日|JP|Japan))((?!(港|台|韩|新|美)).)*$"}
  - {name: ♻️ 美国自动, type: url-test, include-all-providers: true, tolerance: 20, interval: 300, filter: "(?i)^(?=.*(美|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|US|United States))((?!(澳大利亚|AU|Australia)).)*$"}
  - {name: ♻️ 新加坡自动, type: url-test, include-all-providers: true, tolerance: 20, interval: 300, filter: "(?i)新加坡|坡|狮城|SG|Singapore"}
  - {name: ♻️ 自动选择, type: url-test, include-all-providers: true, tolerance: 20, interval: 300, filter: "^((?!(DIRECT)).)*$"}

